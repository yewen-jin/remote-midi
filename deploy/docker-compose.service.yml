# Add this service block to your existing docker-compose.yml
# at /srv/reverse-proxy/docker-compose.yml.
#
# This runs the MIDI relay server and serves the browser client.
# nginxproxy/nginx-proxy handles TLS and routing via VIRTUAL_HOST.
#
# Usage:
#   cd /srv/reverse-proxy
#   docker compose up -d --build midi-relay

services:
  midi-relay:
    build: /home/<username>/remote-midi
    container_name: midi-relay
    restart: unless-stopped
    networks: [proxy]
    environment:
      PORT: 3500
      HOST: 0.0.0.0
      WS_PATH: /midi
      PING_INTERVAL_MS: 15000
      PING_TIMEOUT_MS: 30000
      MAX_ROOMS: 50
      MAX_CLIENTS_PER_ROOM: 20
      MAX_CONNECTIONS_PER_IP: 10
      CONNECT_RATE_LIMIT: 20
      CONNECT_RATE_WINDOW_MS: 60000
      MESSAGE_RATE_LIMIT: 500
      VIRTUAL_HOST: <url>
      VIRTUAL_PORT: 3500
      LETSENCRYPT_HOST: <url>
      LETSENCRYPT_EMAIL: <your-email>
    expose:
      - '3500'
