# Add this service block to your existing docker-compose.yml
#
# Your nginx container proxies to 127.0.0.1:3500 on the host.
# Set network_mode: host so the container shares the host network,
# matching your existing app pattern.

services:
  midi-relay:
    build: .
    # Or use a pre-built image:
    # image: ghcr.io/speakers-corner/midi-relay:latest
    restart: unless-stopped
    network_mode: host        # shares host network — nginx reaches it at 127.0.0.1:3500
    environment:
      PORT: 3500
      HOST: 127.0.0.1         # only accept connections from nginx on the host
      WS_PATH: /midi
      PING_INTERVAL_MS: 15000
      PING_TIMEOUT_MS: 30000
      MAX_ROOMS: 50
      MAX_CLIENTS_PER_ROOM: 20
