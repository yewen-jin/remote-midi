# Nginx reverse proxy configuration for the MIDI relay server.
# Handles TLS termination and WebSocket upgrade.
#
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/.
# Replace relay.example.com with your actual domain.

upstream midi_relay {
    server 127.0.0.1:3500;
}

server {
    listen 80;
    server_name relay.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name relay.example.com;

    # TLS certificates (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/relay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.example.com/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # WebSocket endpoint
    location /midi {
        proxy_pass http://midi_relay;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check endpoint (no WebSocket upgrade)
    location /health {
        proxy_pass http://midi_relay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block everything else
    location / {
        return 404;
    }
}
